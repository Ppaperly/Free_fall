<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>자유 낙하 시뮬레이션</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3efff;
      color: #1f1833;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      width: 100%;
      height: 100svh;
      padding: clamp(8px, 2vw, 18px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(8px, 1.6vw, 14px);
    }

    .control-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d8cdf8;
      border-radius: 18px;
      padding: 10px 12px;
      box-shadow: 0 6px 16px rgba(54, 40, 100, 0.08);
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(20px, 5vw, 32px);
      line-height: 1.1;
    }

    .subtitle {
      margin: 0;
      font-size: clamp(13px, 3.4vw, 17px);
      color: #5d536f;
    }

    .condition-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .condition-label {
      display: block;
      margin-bottom: 3px;
      font-size: clamp(12px, 3vw, 15px);
      color: #5d536f;
      font-weight: 700;
    }

    .condition-value {
      font-size: clamp(18px, 5vw, 30px);
      font-weight: 900;
    }

    .select-card {
      display: grid;
      gap: 8px;
    }

    .select-card label {
      font-weight: 900;
      font-size: clamp(15px, 3.8vw, 21px);
    }

    select {
      width: 100%;
      min-height: 42px;
      border: 1.5px solid #9c86db;
      border-radius: 14px;
      padding: 8px 12px;
      background: #fbf9ff;
      color: #1f1833;
      font-size: clamp(15px, 3.8vw, 20px);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 16px;
      font-size: clamp(16px, 4.2vw, 22px);
      font-weight: 900;
      cursor: pointer;
    }

    #startBtn {
      background: #6f4ff2;
      color: #ffffff;
    }

    #resetBtn {
      background: #e9e2ff;
      color: #35245f;
    }

    .stage-card {
      min-height: 0;
      background: #ffffff;
      border: 1px solid #d8cdf8;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(54, 40, 100, 0.1);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: manipulation;
    }

    .background {
      fill: #fbfaff;
    }

    .start-line {
      stroke: #6d5aa8;
      stroke-width: 2;
      stroke-dasharray: 8 7;
    }

    .ground-line {
      stroke: #1f1833;
      stroke-width: 4;
    }

    .ground-block {
      fill: #8d7bc8;
      opacity: 0.9;
    }

    .guide-line {
      stroke: #9c86db;
      stroke-width: 2;
      stroke-dasharray: 6 9;
    }

    .scene-label {
      fill: #1f1833;
      font-size: 16px;
      font-weight: 900;
    }

    .marker {
      cursor: pointer;
    }

    .hit-area {
      fill: transparent;
    }

    .record-ball {
      fill: #7b7688;
      stroke: #262235;
      stroke-width: 2;
      opacity: 0.62;
    }

    .record-ball.start-point {
      opacity: 0.95;
    }

    .time-label {
      fill: #1f1833;
      font-size: 22px;
      font-weight: 900;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 5px;
      stroke-linejoin: round;
    }

    .moving-ball {
      fill: #2b263a;
      stroke: #090711;
      stroke-width: 2.5;
      pointer-events: none;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(24, 18, 48, 0.5);
    }

    .modal-layer.open {
      display: flex;
    }

    .modal {
      width: min(92vw, 430px);
      background: #ffffff;
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.3);
    }

    .modal h2 {
      margin: 0 0 16px;
      font-size: clamp(24px, 6vw, 34px);
      line-height: 1.1;
    }

    .modal-content {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .info-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f4f0ff;
      font-size: clamp(15px, 4vw, 20px);
    }

    .info-row span:first-child {
      color: #5d536f;
      font-weight: 800;
    }

    .info-row span:last-child {
      color: #1f1833;
      font-weight: 900;
      text-align: right;
    }

    #closeBtn {
      width: 100%;
      background: #6f4ff2;
      color: #ffffff;
    }

    @media (min-width: 760px) and (orientation: landscape) {
      .app {
        grid-template-columns: minmax(300px, 360px) 1fr;
        grid-template-rows: 1fr;
      }

      .control-panel {
        align-content: start;
      }

      .condition-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 690px) {
      .card {
        padding: 7px 10px;
      }

      h1 {
        font-size: 22px;
      }

      .subtitle {
        font-size: 13px;
      }

      button,
      select {
        min-height: 38px;
      }

      .condition-value {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="control-panel">
      <div class="card">
        <h1>자유 낙하 시뮬레이션</h1>
        <p class="subtitle">물체를 선택한 뒤 시작 버튼을 누르세요.</p>
      </div>

      <div class="condition-grid">
        <div class="card">
          <span class="condition-label">높이</span>
          <strong class="condition-value">176.4 m</strong>
        </div>

        <div class="card">
          <span class="condition-label">중력가속도</span>
          <strong class="condition-value">9.8 m/s²</strong>
        </div>
      </div>

      <div class="card select-card">
        <label for="ballSelect">물체 선택</label>

        <select id="ballSelect">
          <option value="small">작은 쇠구슬 · 1 kg</option>
          <option value="medium" selected>중간 크기 쇠구슬 · 2 kg</option>
          <option value="large">큰 쇠구슬 · 3 kg</option>
        </select>

        <div class="button-row">
          <button id="startBtn" type="button">시작</button>
          <button id="resetBtn" type="button">초기화</button>
        </div>
      </div>
    </section>

    <section class="stage-card">
      <svg id="stage" viewBox="0 0 360 720" aria-label="자유 낙하 시뮬레이션 화면">
        <rect x="0" y="0" width="360" height="720" class="background"></rect>

        <line id="startLine" x1="44" y1="88" x2="316" y2="88" class="start-line"></line>
        <text x="44" y="62" class="scene-label">출발점</text>

        <line x1="180" y1="88" x2="180" y2="650" class="guide-line"></line>

        <g id="markers"></g>

        <line id="groundLine" x1="44" y1="650" x2="316" y2="650" class="ground-line"></line>
        <rect x="44" y="650" width="272" height="18" class="ground-block"></rect>
        <text x="44" y="695" class="scene-label">바닥</text>

        <circle id="movingBall" cx="180" cy="77" r="11" class="moving-ball"></circle>
      </svg>
    </section>
  </main>

  <div id="modalLayer" class="modal-layer">
    <div class="modal">
      <h2>측정 정보</h2>
      <div id="modalContent" class="modal-content"></div>
      <button id="closeBtn" type="button">닫기</button>
    </div>
  </div>

  <script>
    const HEIGHT = 176.4;
    const TOTAL_TIME = 6;

    const START_BOTTOM_Y = 88;
    const GROUND_Y = 650;
    const CENTER_X = 180;

    const balls = {
      small: {
        name: "작은 쇠구슬",
        mass: 1,
        radius: 8
      },
      medium: {
        name: "중간 크기 쇠구슬",
        mass: 2,
        radius: 11
      },
      large: {
        name: "큰 쇠구슬",
        mass: 3,
        radius: 15
      }
    };

    const records = [
      { time: 0, distance: 0, speed: 0, position: 176.4 },
      { time: 1, distance: 4.9, speed: 9.8 },
      { time: 2, distance: 19.6, speed: 19.6 },
      { time: 3, distance: 44.1, speed: 29.4 },
      { time: 4, distance: 78.4, speed: 39.2 },
      { time: 5, distance: 122.5, speed: 49.0 },
      { time: 6, distance: 176.4, speed: 58.8 }
    ];

    const ballSelect = document.getElementById("ballSelect");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const closeBtn = document.getElementById("closeBtn");
    const modalLayer = document.getElementById("modalLayer");
    const modalContent = document.getElementById("modalContent");
    const markers = document.getElementById("markers");
    const movingBall = document.getElementById("movingBall");

    let currentBallKey = ballSelect.value;
    let running = false;
    let animationId = null;
    let startTime = null;
    let latestRevealTime = 0;

    function currentBall() {
      return balls[currentBallKey];
    }

    function bottomYFromDistance(distance) {
      const ratio = distance / HEIGHT;
      return START_BOTTOM_Y + ratio * (GROUND_Y - START_BOTTOM_Y);
    }

    function centerYFromDistance(distance) {
      const ball = currentBall();
      return bottomYFromDistance(distance) - ball.radius;
    }

    function numberText(value) {
      if (Number.isInteger(value)) {
        return String(value);
      }

      return value.toFixed(1);
    }

    function svgElement(tag) {
      return document.createElementNS("http://www.w3.org/2000/svg", tag);
    }

    function setMovingBall(distance) {
      const ball = currentBall();
      movingBall.setAttribute("r", ball.radius);
      movingBall.setAttribute("cy", centerYFromDistance(distance));
    }

    function drawRecords(revealTime) {
      markers.innerHTML = "";

      const ball = currentBall();

      records.forEach((record) => {
        const centerY = centerYFromDistance(record.distance);
        const visible = record.time <= revealTime;

        const group = svgElement("g");
        group.classList.add("marker");
        group.setAttribute("role", "button");
        group.setAttribute("tabindex", "0");
        group.setAttribute("data-time", String(record.time));
        group.style.display = visible ? "block" : "none";

        const hit = svgElement("circle");
        hit.setAttribute("class", "hit-area");
        hit.setAttribute("cx", CENTER_X);
        hit.setAttribute("cy", centerY);
        hit.setAttribute("r", Math.max(30, ball.radius + 16));

        const circle = svgElement("circle");
        circle.setAttribute("class", record.time === 0 ? "record-ball start-point" : "record-ball");
        circle.setAttribute("cx", CENTER_X);
        circle.setAttribute("cy", centerY);
        circle.setAttribute("r", ball.radius);

        const label = svgElement("text");
        label.setAttribute("class", "time-label");
        label.setAttribute("x", CENTER_X + ball.radius + 18);
        label.setAttribute("y", centerY + 1);
        label.textContent = `${record.time}초`;

        group.appendChild(hit);
        group.appendChild(circle);
        group.appendChild(label);

        group.addEventListener("click", () => {
          openModal(record);
        });

        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openModal(record);
          }
        });

        markers.appendChild(group);
      });
    }

    function revealRecordsUpTo(timeValue) {
      latestRevealTime = timeValue;

      const groups = markers.querySelectorAll(".marker");

      groups.forEach((group) => {
        const recordTime = Number(group.getAttribute("data-time"));

        if (recordTime <= timeValue) {
          group.style.display = "block";
        } else {
          group.style.display = "none";
        }
      });
    }

    function makeRow(label, value) {
      const row = document.createElement("div");
      row.className = "info-row";

      const labelSpan = document.createElement("span");
      labelSpan.textContent = label;

      const valueSpan = document.createElement("span");
      valueSpan.textContent = value;

      row.appendChild(labelSpan);
      row.appendChild(valueSpan);

      return row;
    }

    function openModal(record) {
      const ball = currentBall();

      modalContent.innerHTML = "";
      modalContent.appendChild(makeRow("질량", `${ball.mass} kg`));
      modalContent.appendChild(makeRow("시간", `${record.time}초`));

      if (record.time === 0) {
        modalContent.appendChild(makeRow("위치", `지면으로부터 ${numberText(record.position)} m`));
        modalContent.appendChild(makeRow("속력", `${numberText(record.speed)} m/s`));
      } else {
        modalContent.appendChild(makeRow("속력", `${numberText(record.speed)} m/s`));
        modalContent.appendChild(makeRow("낙하거리", `${numberText(record.distance)} m`));
      }

      modalLayer.classList.add("open");
    }

    function closeModal() {
      modalLayer.classList.remove("open");
    }

    function animate(now) {
      if (startTime === null) {
        startTime = now;
      }

      const elapsed = Math.min((now - startTime) / 1000, TOTAL_TIME);
      const distance = 4.9 * elapsed * elapsed;

      setMovingBall(distance);

      records.forEach((record) => {
        if (elapsed >= record.time + 0.03) {
          const marker = markers.querySelector(`[data-time="${record.time}"]`);
          if (marker) {
            marker.style.display = "block";
          }
        }
      });

      if (elapsed < TOTAL_TIME) {
        animationId = requestAnimationFrame(animate);
      } else {
        running = false;
        startTime = null;
        setMovingBall(HEIGHT);
        revealRecordsUpTo(6);
      }
    }

    function startSimulation() {
      if (running) return;

      cancelAnimationFrame(animationId);
      closeModal();

      running = true;
      startTime = null;
      latestRevealTime = 0;

      drawRecords(0);
      setMovingBall(0);
      animationId = requestAnimationFrame(animate);
    }

    function resetSimulation() {
      cancelAnimationFrame(animationId);

      running = false;
      startTime = null;
      animationId = null;
      latestRevealTime = 0;

      closeModal();
      drawRecords(0);
      setMovingBall(0);
    }

    ballSelect.addEventListener("change", () => {
      currentBallKey = ballSelect.value;
      resetSimulation();
    });

    startBtn.addEventListener("click", startSimulation);
    resetBtn.addEventListener("click", resetSimulation);
    closeBtn.addEventListener("click", closeModal);

    modalLayer.addEventListener("click", (event) => {
      if (event.target === modalLayer) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    drawRecords(0);
    setMovingBall(0);
    closeModal();
  </script>
</body>
</html>
